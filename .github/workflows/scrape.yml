name: Run Scraper

on:
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight
  workflow_dispatch:    # Allows you to run it manually

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt
             pip install huggingface-hub

      - name: Run scraper with retry
        run: |
          for i in {1..3}; do
            echo "Attempt $i"
            python Scraper.py && break

            if [ $i -eq 3 ]; then
              echo "All attempts failed"
              exit 1
            fi
            echo "Attempt $i failed." 
            echo "Retry in 2 minutes" 
            sleep 120
          done
    

      - name: Commit and push changes to local repo
        if: success()
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add fidal_meets_data.csv
          git commit -m "Automated data update: $(date)" || echo "No changes to commit"
          git push
